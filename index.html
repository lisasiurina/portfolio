<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liza Siurina - Cyber Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2bd5; 
            --neon-glow: rgba(255, 43, 213, 0.4);
            --bg-dark: #000000; 
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            margin: 0;
        }

        .pixel-font {
            font-family: 'Press Start 2P', cursive;
        }

        /* Анимация левитации аватара */
        .avatar-box {
            position: relative;
            width: 140px;
            height: 140px;
            image-rendering: pixelated;
            filter: drop-shadow(0 0 15px var(--neon-pink));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* Стили неоновых панелей */
        .cyber-panel {
            background: rgba(5, 5, 5, 0.95);
            border: 1px solid var(--neon-pink);
            box-shadow: 0 0 20px rgba(255, 43, 213, 0.15);
            position: relative;
        }

        .profile-sidebar {
            background: transparent;
            border: none;
            box-shadow: none;
            position: relative;
        }

        /* Элементы меню */
        .menu-grid-item {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(255, 43, 213, 0.4);
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
        }

        .menu-grid-item:hover {
            background: rgba(255, 43, 213, 0.15);
            border-color: var(--neon-pink);
            box-shadow: 0 0 25px var(--neon-glow);
            transform: translateY(-2px);
        }

        .menu-grid-item .arrow {
            color: var(--neon-pink);
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .menu-grid-item:hover .arrow {
            opacity: 1;
            filter: drop-shadow(0 0 5px var(--neon-pink));
        }

        .typing-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ffe6f9; 
            display: inline;
        }

        /* Каретка терминала */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: var(--neon-pink);
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 8px var(--neon-pink);
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Эффект ретро-монитора (сканирующие линии) */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(255, 0, 255, 0.01) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.005), rgba(0, 0, 255, 0.01));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Навигация (появляется при переходе) */
        #top-nav {
            transform: translateY(-100%);
            transition: transform 0.5s ease;
        }
        #top-nav.visible {
            transform: translateY(0);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-6">
    <div class="scanlines"></div>

    <!-- Верхнее меню -->
    <nav id="top-nav" class="fixed top-0 left-0 w-full bg-black/95 border-b border-pink-500/30 py-4 px-10 flex justify-between items-center z-50">
        <div class="pixel-font text-[10px] text-pink-500">LIZA_SIURINA.SYS</div>
        <div class="flex gap-8 text-[9px] pixel-font">
            <a href="#" onclick="goHome()" class="hover:text-pink-400">HOME</a>
            <a href="#" class="hover:text-pink-400">PROJECTS</a>
            <a href="#" class="hover:text-pink-400">RESEARCH</a>
            <a href="#" class="hover:text-pink-400">CV</a>
            <a href="#" class="hover:text-pink-400">CONTACT</a>
        </div>
    </nav>

    <!-- Основной контент -->
    <main id="portal" class="w-full max-w-6xl flex flex-col md:flex-row gap-10 items-stretch z-10 transition-opacity duration-500">
        
        <!-- Левая панель: Профиль -->
        <div class="profile-sidebar p-8 flex flex-col items-center shrink-0 w-full md:w-72">
            <div class="avatar-box mb-8 mt-4">
                <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
                    <!-- Волосы (фон) -->
                    <rect x="7" y="9" width="18" height="19" fill="#2d1a10" />
                    <!-- Лицо -->
                    <rect x="10" y="10" width="12" height="11" fill="#FFE0BD" />
                    <!-- Глаза (темно-оливковые) -->
                    <rect x="12" y="14" width="2" height="2" fill="#2d3d1a" /> 
                    <rect x="18" y="14" width="2" height="2" fill="#2d3d1a" />
                    <!-- Рот -->
                    <rect x="13" y="18" width="6" height="1" fill="#FF8080" />
                    <rect x="12" y="17" width="1" height="1" fill="#FF8080" />
                    <rect x="19" y="17" width="1" height="1" fill="#FF8080" />
                    <!-- Волосы (передний план) -->
                    <rect x="8" y="8" width="16" height="5" fill="#3d2315" />
                    <rect x="7" y="11" width="3" height="14" fill="#3d2315" />
                    <rect x="22" y="11" width="3" height="14" fill="#3d2315" />
                    <!-- Одежда -->
                    <rect x="9" y="21" width="14" height="7" fill="#111" />
                    <rect x="9" y="23" width="14" height="1" fill="#ff2bd5" opacity="0.5" />
                </svg>
            </div>

            <div class="space-y-2 mb-4 text-center">
                <p class="pixel-font text-[10px] text-white leading-tight">INTERACTIVE SYSTEMS</p>
                <p class="pixel-font text-[10px] text-white leading-tight">RESEARCH & DESIGN</p>
            </div>

            <div class="mb-4">
                <p class="pixel-font text-[9px] text-pink-400">Google PhD Fellow</p>
            </div>
            <div class="mt-auto w-full"></div>
        </div>

        <!-- Правая панель: Терминал и Кнопки -->
        <div class="flex-grow flex flex-col gap-8">
            
            <div class="pt-4">
                <div class="cyber-panel p-10 min-h-[220px] flex flex-col justify-center">
                    <!-- Тэг с именем сверху -->
                    <div class="absolute -top-3 left-6 bg-pink-600 px-3 py-1 text-[9px] pixel-font shadow-[0_0_15px_var(--neon-pink)] whitespace-nowrap z-20">
                        LIZA SIURINA
                    </div>
                    
                    <div id="greeting-container" class="flex items-start">
                        <div class="flex-grow">
                            <div id="greeting" class="typing-text"></div><span id="terminal-cursor" class="cursor hidden"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Навигационная сетка -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="menu-grid-item pixel-font text-[11px]" onclick="navigateTo('projects')">
                    <span>01. Projects</span>
                    <span class="arrow">>></span>
                </div>
                <div class="menu-grid-item pixel-font text-[11px]" onclick="navigateTo('research')">
                    <span>02. Research</span>
                    <span class="arrow">>></span>
                </div>
                <div class="menu-grid-item pixel-font text-[11px]" onclick="navigateTo('cv')">
                    <span>03. CV</span>
                    <span class="arrow">>></span>
                </div>
                <div class="menu-grid-item pixel-font text-[11px]" onclick="navigateTo('contact')">
                    <span>04. Contact</span>
                    <span class="arrow">>></span>
                </div>
            </div>

            <div class="h-8"></div>
        </div>
    </main>

    <script>
        const welcomeMsg = "Hi, I’m Liza.\n\nI design and research interactive systems and games.\n\nBelow you can explore my projects, research, and CV.";
        
        let isTyping = false;

        // Эффект печатной машинки
        function typeWriter(text, elementId) {
            if (isTyping) return;
            isTyping = true;
            
            const el = document.getElementById(elementId);
            const cursor = document.getElementById('terminal-cursor');
            
            el.innerHTML = "";
            cursor.classList.add('hidden');
            
            let i = 0;
            const interval = setInterval(() => {
                if (i < text.length) {
                    if (text.charAt(i) === "\n") {
                        el.innerHTML += "<br>";
                    } else {
                        el.innerHTML += text.charAt(i);
                    }
                    i++;
                } else {
                    clearInterval(interval);
                    isTyping = false;
                    cursor.classList.remove('hidden'); // Показываем мигающий курсор в конце
                }
            }, 20);
        }

        // Заглушка для навигации
        function navigateTo(section) {
            const portal = document.getElementById('portal');
            const topNav = document.getElementById('top-nav');
            portal.style.opacity = '0';
            setTimeout(() => {
                portal.classList.add('hidden');
                topNav.classList.add('visible');
            }, 500);
        }

        // Возврат на главную
        function goHome() {
            const portal = document.getElementById('portal');
            const topNav = document.getElementById('top-nav');
            topNav.classList.remove('visible');
            setTimeout(() => {
                portal.classList.remove('hidden');
                portal.style.opacity = '1';
                typeWriter(welcomeMsg, 'greeting');
            }, 500);
        }

        window.onload = () => {
            typeWriter(welcomeMsg, 'greeting');
        };
    </script>
</body>
</html>
